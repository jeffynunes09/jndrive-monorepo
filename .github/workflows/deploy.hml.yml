name: Deploy Homologacao

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-hml
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. TESTES E BUILD CHECK
  # ─────────────────────────────────────────────────────────
  test:
    name: Testes e Verificacao de Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter shared-types build
          pnpm --filter shared-events build
          pnpm --filter shared-config build

      - name: Verificar tipos do backend (TypeScript)
        run: pnpm --filter backend run typecheck

      - name: Rodar testes do backend
        run: pnpm --filter backend test

      - name: Rodar testes do admin
        run: pnpm --filter admin test --run

      - name: Build do admin (verifica se compila sem erros)
        env:
          VITE_API_URL: ${{ secrets.HML_VITE_API_URL }}
          VITE_S3_BASE_URL: ${{ secrets.HML_VITE_S3_BASE_URL }}
        run: pnpm --filter admin build

  # ─────────────────────────────────────────────────────────
  # 2. DEPLOY — aciona os deploy hooks do Render
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy (Homologacao)
    runs-on: ubuntu-latest
    needs: test
    environment: homologacao
    steps:
      - name: Deploy backend no Render
        run: |
          curl -sf -X POST "${{ secrets.RENDER_HML_BACKEND_DEPLOY_HOOK }}"
          echo "Deploy do backend acionado."

      - name: Deploy admin no Render
        run: |
          curl -sf -X POST "${{ secrets.RENDER_HML_ADMIN_DEPLOY_HOOK }}"
          echo "Deploy do admin acionado."

  # ─────────────────────────────────────────────────────────
  # 3. NOTIFICACAO
  # ─────────────────────────────────────────────────────────
  notify:
    name: Notificar Resultado
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Sucesso
        if: needs.deploy.result == 'success'
        run: echo "Deploy de HOMOLOGACAO concluido com sucesso."

      - name: Falha
        if: needs.deploy.result == 'failure'
        run: |
          echo "FALHA no deploy de HOMOLOGACAO!"
          exit 1
